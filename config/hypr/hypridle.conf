# Hypridle - idle management daemon
# Locks via loginctl lock-session, which hypridle's lock_cmd turns into hyprlock.

general {
    lock_cmd = pidof hyprlock || hyprlock        # run hyprlock if not already running (triggered by loginctl lock-session)
    before_sleep_cmd = loginctl lock-session     # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on   # turn screens back on after wake
    ignore_dbus_inhibit = false                  # respect idle-inhibit from apps (mpv, firefox, steam, etc.)
}

# Warn before locking
listener {
    timeout = 540                                # 9 min
    on-timeout = notify-send "  Idle" "Locking soon..."
    on-resume = notify-send "  Back" "Welcome back"
}

# Lock the session
listener {
    timeout = 600                                # 10 min
    on-timeout = loginctl lock-session
}

# Turn off displays shortly after locking
listener {
    timeout = 630                                # 10.5 min
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}
