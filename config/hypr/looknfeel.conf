# Look & feel: tiling layout, gaps, borders.
# i3/sway-like dwindle tiling. Colors pull from wallust (sourced in hyprland.conf).

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2

    col.active_border = $color6 $color14 45deg
    col.inactive_border = $color0

    layout = hy3
    resize_on_border = true
    allow_tearing = false
}

decoration {
    rounding = 4

    blur {
        enabled = true
        size = 4
        passes = 2
    }

    shadow {
        enabled = true
        range = 8
        render_power = 2
    }
}

# hy3 = true i3/sway-style manual tiling tree.
# Colors pull from wallust ($colorN). Tab backgrounds are kept translucent
# so the blur underneath shows through.
plugin {
    hy3 {
        # When a node is removed leaving a lone group, keep it only if its
        # parent is a tab group (i3-ish behavior).
        node_collapse_policy = 2

        # Inset for a single-window group.
        group_inset = 8

        # Don't auto-tab the first window on a workspace.
        tab_first_window = false

        tabs {
            height = 18
            padding = 4
            from_top = false
            radius = 4
            border_width = 2
            render_text = true
            text_center = true
            text_font = Sans
            text_height = 9
            text_padding = 4

            blur = true
            opacity = 0.9

            colors {
                # active = focused tab on the focused monitor
                active = rgba(B4954066)
                active_border = $color14
                active_text = $foreground

                # focused node inside an unfocused container
                focused = rgba(42464A66)
                focused_border = $color6
                focused_text = $foreground

                # inactive tabs
                inactive = rgba(181B1E99)
                inactive_border = $color0
                inactive_text = $color7

                # urgent
                urgent = rgba(7A717399)
                urgent_border = $color3
                urgent_text = $foreground
            }
        }

        # Manual i3-style splitting (no autotiling).
        autotile {
            enable = false
        }
    }

    # hyprEasymotion: jump-to-window labels. Wallust-themed, translucent + blurred.
    # bgcolor uses $backgroundAlpha (wallust bg @ ~70% opacity) so blur shows through.
    easymotion {
        textsize = 42
        textcolor = $foreground
        bgcolor = $backgroundAlpha
        blur = 1
        blurA = 1.0
        xray = 0
        textfont = Sans
        textpadding = 18 30 18 30
        bordersize = 1
        bordercolor = $color0
        rounding = 14
        fullscreen_action = none
        # home-row keys first, with overflow for many windows (';' is the trigger, excluded)
        motionkeys = asdfghjklqwertyuiopzxcvbnm
        motionlabels = ASDFGHJKLQWERTYUIOPZXCVBNM
    }
}

# Subtle animations; remove this block if you prefer instant, i3-like snappiness.
animations {
    enabled = true
    bezier = easeOut, 0.16, 1, 0.3, 1
    animation = windows, 1, 3, easeOut
    animation = workspaces, 1, 3, easeOut
    animation = fade, 1, 3, easeOut
}

# Frosted-glass blur for translucent rofi launcher / cheatsheet
layerrule = match:namespace rofi, blur on
layerrule = match:namespace rofi, ignore_alpha 0

# Slightly translucent editor so the global blur shows through (ghostty-like).
windowrule = opacity 0.90 0.85, match:class ^(cursor)$
