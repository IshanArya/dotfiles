# This config is a STUB! This should never be generated.
# Use the default lua config from https://github.com/hyprwm/Hyprland/blob/main/example/hyprland.lua



# wallust generated colors
source = /home/nyx/.config/hypr/wallust/colors-hyprland.conf

# monitors
source = /home/nyx/.config/hypr/monitors.conf
source = /home/nyx/.config/hypr/workspaces.conf


$mainMod = SUPER
$terminal = ghostty
$fileManager = thunar
$menu = rofi -show drun

# Load hyprpm plugins (hy3 layout, hyprEasymotion) synchronously during config
# parse so their dispatchers (e.g. easymotion) are registered before keybinds.conf
# is sourced. Using exec-once = hyprpm reload loads them too late.
plugin = /var/cache/hyprpm/nyx/hy3/hy3.so
plugin = /var/cache/hyprpm/nyx/hyprland-easymotion/hyprEasymotion.so

# Autostart
exec-once = waybar
exec-once = swaync
exec-once = hypridle
exec-once = sunsetr
exec-once = swayosd-server
exec-once = awww-daemon & sleep 1 && ~/.config/hypr/scripts/theme-switch.sh $(darkman get)

# Tiling layout, gaps, borders, groups
source = /home/nyx/.config/hypr/looknfeel.conf

# i3/sway-style keybindings
source = /home/nyx/.config/hypr/keybinds.conf
