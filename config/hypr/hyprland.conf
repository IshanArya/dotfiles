# This config is a STUB! This should never be generated.
# Use the default lua config from https://github.com/hyprwm/Hyprland/blob/main/example/hyprland.lua



# wallust generated colors
source = /home/nyx/.config/hypr/wallust/colors-hyprland.conf

# monitors
source = /home/nyx/.config/hypr/monitors.conf
source = /home/nyx/.config/hypr/workspaces.conf


$mainMod = SUPER
$terminal = ghostty
$fileManager = thunar
$menu = rofi -show drun

# Load hyprpm plugins (hy3 layout, hyprEasymotion, split-monitor-workspaces) via
# hyprpm reload instead of hardcoded `plugin =` lines. hyprpm reload only loads
# plugins whose ABI matches the running Hyprland, SKIPPING incompatible/missing
# ones with a warning instead of crashing the session. This means a plugin that
# fails to rebuild after a Hyprland upgrade will NOT block login.
#
# Note: dispatchers (easymotion, hy3:*) are resolved at keypress time, not at
# config-parse time, so loading plugins slightly after keybinds.conf is parsed is
# fine — the binds still work once the plugin is loaded.
exec-once = hyprpm reload -n

# Unified cross-monitor workspaces (GNOME-like): each monitor gets its own
# 1-10 range (DP-1: 1-10, DP-2: 11-20) but link_monitors switches both together,
# so "desktop N" spans both screens. Keybinds use split-workspace /
# split-movetoworkspacesilent (see keybinds.conf).
plugin {
    split-monitor-workspaces {
        count = 10
        keep_focused = 0
        enable_notifications = 0
        enable_persistent_workspaces = 1
        enable_wrapping = 0
        link_monitors = 1
        monitor_priority = DP-1, DP-2
    }
}

# Autostart
exec-once = waybar
exec-once = swaync
exec-once = hypridle
exec-once = sunsetr
exec-once = swayosd-server
# Start the wallpaper daemon first so it binds the correct ($WAYLAND_DISPLAY)
# socket, then start darkman in-session. darkman inherits Hyprland's environment
# here (WAYLAND_DISPLAY, HYPRLAND_INSTANCE_SIGNATURE, XDG_CURRENT_DESKTOP), so its
# startup hook fires theme-switch.sh against the live socket instead of wayland-0.
# (darkman.service is intentionally disabled; do not re-enable it.)
# --no-cache: do NOT restore awww's previous-session wallpaper when outputs
# connect. darkman's startup hook (theme-switch.sh) is the single source of
# truth for the wallpaper, and runs on every login. Without --no-cache, awww's
# per-monitor cache restore races the hook and can repaint the stale (e.g. dark)
# wallpaper ~300ms AFTER theme-switch set the correct (e.g. light) one.
exec-once = awww-daemon --no-cache
exec-once = darkman run

# Tiling layout, gaps, borders, groups
source = /home/nyx/.config/hypr/looknfeel.conf

# i3/sway-style keybindings
source = /home/nyx/.config/hypr/keybinds.conf
