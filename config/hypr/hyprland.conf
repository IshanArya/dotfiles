# wallust generated colors
source = /home/nyx/.config/hypr/wallust/colors-hyprland.conf

# monitors
source = /home/nyx/.config/hypr/monitors.conf
source = /home/nyx/.config/hypr/workspaces.conf


$mainMod = SUPER
$terminal = ghostty
$fileManager = thunar
$menu = rofi -show drun

# Load hyprpm plugins (hy3 layout, hyprEasymotion, split-monitor-workspaces) the
# hyprpm-recommended way: `hyprpm reload` loads all ENABLED plugins, skipping any
# that are incompatible/missing instead of crashing the session. This keeps hyprpm
# as the single source of truth — `hyprpm enable/disable` Just Works with no config
# edits and no dangling-path errors.
#
# The trailing `hyprctl reload` re-parses the config AFTER plugins are loaded, so
# their dispatchers (hy3:*, easymotion, split-workspace) now exist and the
# "Invalid dispatcher" parse errors clear (Hyprland destroys the error overlay on
# an error-free reload). Real config errors still surface normally — nothing is
# suppressed. `hyprctl reload` does NOT re-run exec-once entries.
exec-once = hyprpm reload -n && hyprctl reload

# Unified cross-monitor workspaces (GNOME-like): each monitor gets its own
# 1-10 range (DP-1: 1-10, DP-2: 11-20) but link_monitors switches both together,
# so "desktop N" spans both screens. Keybinds use split-workspace /
# split-movetoworkspacesilent (see keybinds.conf).
plugin {
    split-monitor-workspaces {
        count = 10
        keep_focused = 0
        enable_notifications = 0
        enable_persistent_workspaces = 1
        enable_wrapping = 0
        link_monitors = 1
        monitor_priority = DP-1, DP-2
    }
}

# Autostart
exec-once = waybar
exec-once = swaync
exec-once = hypridle
exec-once = sunsetr
exec-once = swayosd-server
# Start the wallpaper daemon first so it binds the correct ($WAYLAND_DISPLAY)
# socket, then start darkman in-session. darkman inherits Hyprland's environment
# here (WAYLAND_DISPLAY, HYPRLAND_INSTANCE_SIGNATURE, XDG_CURRENT_DESKTOP), so its
# startup hook fires theme-switch.sh against the live socket instead of wayland-0.
# (darkman.service is intentionally disabled; do not re-enable it.)
#
# Caching is intentionally LEFT ON (no --no-cache): awww's documented purpose for
# the cache is to "set the wallpaper to the previous image when a monitor is
# (re)connected or turned on". On NVIDIA-only cold boot (iGPU disabled) the DRM
# outputs aren't render-ready when theme-switch.sh's awww img fires, so that paint
# is dropped; with caching on, awww repaints from cache the moment DP-1/DP-2 become
# ready — fixing the "black wallpaper at login" race. theme-switch.sh still sets the
# authoritative current-mode wallpaper (which also refreshes the cache). The only
# tradeoff is a possible ~300ms flash of the previous wallpaper if the theme changed
# across a reboot, which self-corrects once theme-switch's awww img lands.
exec-once = awww-daemon
# Re-assert the current-mode wallpaper on every output (re)creation. Guards
# against awww's per-output cache-restore repainting the PREVIOUS mode after the
# DRM outputs settle late (NVIDIA-only cold boot) and against monitor DPMS/cable
# reconnect. Makes .current-wallpaper the source of truth. Requires socat.
# (Idle 0% CPU; dies with the session; no duplicate on `hyprctl reload`.)
exec-once = ~/.config/hypr/scripts/monitor-wallpaper-listener.sh
exec-once = darkman run

# Tiling layout, gaps, borders, groups
source = /home/nyx/.config/hypr/looknfeel.conf

# i3/sway-style keybindings
source = /home/nyx/.config/hypr/keybinds.conf
