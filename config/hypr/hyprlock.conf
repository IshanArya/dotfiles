# Hyprlock - themed to match wallust gold/teal desktop theme.
# Tuned for 4K (3840x2160) monitors. Fonts: JetBrainsMono Nerd Font.
# Colors sourced from wallust ($color0-$color15).

source = /home/nyx/.config/hypr/wallust/colors-hyprland.conf

general {
    hide_cursor = true
    immediate_render = true
}

background {
    monitor =
    path = /home/nyx/.config/hypr/.current-wallpaper
    color = rgb(181B1E)              # $background, shown until image loads

    blur_size = 4
    blur_passes = 2                  # matches desktop blur (looknfeel.conf)
    noise = 0.0117
    contrast = 1.3000
    brightness = 0.7000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}

# Date
label {
    monitor =
    text = cmd[update:43200000] echo "<b> $(date +'%A, %-d %B') </b>"
    color = $color13
    font_size = 80
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, -40
    halign = center
    valign = center
}

# Time (AM/PM)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%I:%M %p')"
    color = $color8
    font_size = 220
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, -180
    halign = center
    valign = top
}

# Username
label {
    monitor =
    text =   $USER
    color = $color14
    font_size = 56
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 340
    halign = center
    valign = bottom
}

# Input field
input-field {
    monitor =
    size = 420, 110
    outline_thickness = 3
    dots_size = 0.2
    dots_spacing = 0.25
    dots_center = true
    outer_color = $color6
    inner_color = rgba(24, 27, 30, 0.5)        # $background, translucent
    capslock_color = $color14
    font_color = $color15
    fade_on_empty = false
    font_family = JetBrainsMono Nerd Font Bold
    placeholder_text = <i><span foreground="##EFDBA2cc">  Enter password</span></i>
    hide_input = false
    rounding = 8
    position = 0, 120
    halign = center
    valign = bottom
}

# Keyboard layout
label {
    monitor =
    text = $LAYOUT
    color = $color8
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, 60
    halign = center
    valign = bottom
}

# Uptime (bottom-right)
label {
    monitor =
    text = cmd[update:60000] echo "<b> 󰔚 $(uptime -p) </b>"
    color = $color8
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    position = -40, 40
    halign = right
    valign = bottom
}
