# =============================================================================
# i3/sway-style keybindings for Hyprland
# $mainMod, $terminal, $fileManager, $menu are defined in hyprland.conf
# bindd = MODS, KEY, DESCRIPTION, DISPATCHER, PARAMS  (description powers cheatsheet)
# =============================================================================

# --- Apps & session ----------------------------------------------------------
bindd = $mainMod, Return, Terminal, exec, $terminal
bindd = $mainMod, D, Application launcher, exec, $menu
bindd = $mainMod SHIFT, Return, File manager, exec, $fileManager
bindd = $mainMod SHIFT, Q, Kill active window, hy3:killactive,
bindd = $mainMod SHIFT, C, Reload Hyprland config, exec, hyprctl reload
bindd = $mainMod SHIFT, E, Exit / logout, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# --- Lock screen -------------------------------------------------------------
# K860 lock key is remapped to F13 by keyd (alt+l -> f13). Both go through
# loginctl lock-session, which hypridle turns into hyprlock.
bindd = , code:191, Lock screen, exec, loginctl lock-session
bindd = $mainMod SHIFT, X, Lock screen, exec, loginctl lock-session

# --- Cheat sheet -------------------------------------------------------------
bindd = $mainMod, slash, Search all keybinds, exec, $HOME/.config/hypr/scripts/cheatsheet-search.sh
bindd = $mainMod SHIFT, slash, Quick cheat sheet, exec, $HOME/.config/hypr/scripts/cheatsheet-quick.sh

# --- Window state ------------------------------------------------------------
bindd = $mainMod, F, Fullscreen, fullscreen, 0
bindd = $mainMod SHIFT, F, Maximize (keep gaps/bar), fullscreen, 1
bindd = $mainMod SHIFT, SPACE, Toggle floating, togglefloating,
bindd = $mainMod, P, Toggle pseudotile, pseudo,

# =============================================================================
# hy3 dispatcher notes:
#   * 'visible' on hy3:movefocus  -> focus jumps between VISIBLE windows only,
#     treating a tab group as one unit (so Super+Tab is what cycles within it).
#   * 'once' on hy3:movewindow    -> window moves to the neighboring group
#     WITHOUT descending into it, so windows don't auto-join groups as tabs.
#   To build a group, focus a window and tab it with Super+W, or use the
#   split binds (Super+E / V / B) below.
# =============================================================================

# --- Focus (vim keys + arrows) ----------------------------------------------
bindd = $mainMod, h, Focus left, hy3:movefocus, l, visible
bindd = $mainMod, j, Focus down, hy3:movefocus, d, visible
bindd = $mainMod, k, Focus up, hy3:movefocus, u, visible
bindd = $mainMod, l, Focus right, hy3:movefocus, r, visible
bind = $mainMod, left,  hy3:movefocus, l, visible
bind = $mainMod, down,  hy3:movefocus, d, visible
bind = $mainMod, up,    hy3:movefocus, u, visible
bind = $mainMod, right, hy3:movefocus, r, visible

# Easymotion: overlay jump labels, type the label to focus that window.
bindd = $mainMod, semicolon, Easymotion jump to window, easymotion, action:hyprctl dispatch focuswindow address:{}

# --- Move window (vim keys + arrows) ----------------------------------------
bindd = $mainMod SHIFT, h, Move window left, hy3:movewindow, l, once
bindd = $mainMod SHIFT, j, Move window down, hy3:movewindow, d, once
bindd = $mainMod SHIFT, k, Move window up, hy3:movewindow, u, once
bindd = $mainMod SHIFT, l, Move window right, hy3:movewindow, r, once
bind = $mainMod SHIFT, left,  hy3:movewindow, l, once
bind = $mainMod SHIFT, down,  hy3:movewindow, d, once
bind = $mainMod SHIFT, up,    hy3:movewindow, u, once
bind = $mainMod SHIFT, right, hy3:movewindow, r, once

# --- Move window across monitors --------------------------------------------
# hy3:movewindow stays within a workspace's tree, so use Hyprland's built-in
# movewindow mon: dispatcher to send the focused window to the other monitor.
bindd = $mainMod SHIFT, comma, Move window to left monitor, movewindow, mon:l
bindd = $mainMod SHIFT, period, Move window to right monitor, movewindow, mon:r

# --- Split (hy3 makegroup) ---------------------------------------------------
# Create an explicit horizontal/vertical split container, i3-style.
bindd = $mainMod, E, Split opposite direction, hy3:makegroup, opposite
bindd = $mainMod, V, Split vertical, hy3:makegroup, v
bindd = $mainMod, B, Split horizontal, hy3:makegroup, h

# --- Tabbed groups (i3 tabbed/stacked equivalent) ----------------------------
bindd = $mainMod, W, Toggle tab group, hy3:changegroup, toggletab
bindd = $mainMod, Tab, Next tab, hy3:focustab, r, wrap
bindd = $mainMod SHIFT, Tab, Previous tab, hy3:focustab, l, wrap
# Change the focused group's layout (i3-style layout toggles)
bindd = $mainMod ALT, h, Untab group, hy3:changegroup, untab
bindd = $mainMod ALT, l, Flip split orientation, hy3:changegroup, opposite

# --- Resize mode (i3 "resize" submap) ----------------------------------------
# Super+R enters resize mode: h/j/k/l or arrows resize; Esc/Return to exit.
bindd = $mainMod, R, Enter resize mode, submap, resize
submap = resize
binde = , h, resizeactive, -40 0
binde = , j, resizeactive, 0 40
binde = , k, resizeactive, 0 -40
binde = , l, resizeactive, 40 0
binde = , left,  resizeactive, -40 0
binde = , down,  resizeactive, 0 40
binde = , up,    resizeactive, 0 -40
binde = , right, resizeactive, 40 0
bind = , escape, submap, reset
bind = , Return, submap, reset
submap = reset

# --- Workspaces 1-10 ---------------------------------------------------------
bindd = $mainMod, 1, Switch to workspace 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active node to workspace 1-10 (hy3 moves the whole focused node)
bindd = $mainMod SHIFT, 1, Move window to workspace 1, hy3:movetoworkspace, 1
bind = $mainMod SHIFT, 2, hy3:movetoworkspace, 2
bind = $mainMod SHIFT, 3, hy3:movetoworkspace, 3
bind = $mainMod SHIFT, 4, hy3:movetoworkspace, 4
bind = $mainMod SHIFT, 5, hy3:movetoworkspace, 5
bind = $mainMod SHIFT, 6, hy3:movetoworkspace, 6
bind = $mainMod SHIFT, 7, hy3:movetoworkspace, 7
bind = $mainMod SHIFT, 8, hy3:movetoworkspace, 8
bind = $mainMod SHIFT, 9, hy3:movetoworkspace, 9
bind = $mainMod SHIFT, 0, hy3:movetoworkspace, 10

# Cycle workspaces (i3 prev/next)
bindd = $mainMod CTRL, h, Previous workspace, workspace, e-1
bindd = $mainMod CTRL, l, Next workspace, workspace, e+1
bind = $mainMod CTRL, left,  workspace, e-1
bind = $mainMod CTRL, right, workspace, e+1

# Special / scratchpad workspace (i3-like)
bindd = $mainMod, minus, Toggle scratchpad, togglespecialworkspace, scratch
bindd = $mainMod SHIFT, minus, Move window to scratchpad, movetoworkspace, special:scratch

# --- Mouse -------------------------------------------------------------------
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- Screenshots -------------------------------------------------------------
bindd = $mainMod SHIFT, 3, Screenshot full screen, exec, grim ~/Photos/Screenshots/screenshot-$(date +%Y%m%d-%H%M%S).png
bindd = $mainMod SHIFT, 4, Screenshot region to file, exec, grim -g "$(slurp)" ~/Photos/Screenshots/screenshot-$(date +%Y%m%d-%H%M%S).png
bindd = $mainMod SHIFT, 5, Screenshot region to clipboard, exec, grim -g "$(slurp)" - | wl-copy
bindd = $mainMod SHIFT, S, Screenshot region annotate, exec, grim -g "$(slurp)" - | swappy -f -
