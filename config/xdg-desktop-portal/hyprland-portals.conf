# Per-user portal backend selection for the Hyprland session
# (XDG_CURRENT_DESKTOP=Hyprland -> xdg-desktop-portal reads *-portals.conf for "hyprland").
#
# Keep Hyprland's defaults (screenshare, global shortcuts) with GTK as fallback
# (file picker, etc.), but route the Settings interface to darkman so the
# org.freedesktop.appearance color-scheme follows darkman's light/dark mode.
# Without this, the GTK backend answers color-scheme from a stale gsettings value
# and apps like Brave/Firefox stay on the wrong theme.
[preferred]
default=hyprland;gtk
org.freedesktop.impl.portal.Settings=darkman
